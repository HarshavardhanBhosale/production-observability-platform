global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'slack-notifications'
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-emergency'

receivers:
- name: 'slack-notifications'
  slack_configs:
  - api_url: 'https://slack.com'
    channel: '#ops-alerts'
    send_resolved: true

- name: 'pagerduty-emergency'
  webhook_configs:
  - url: 'https://pagerduty.com'
