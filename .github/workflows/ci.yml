name: Production Observability Stack CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # ... (Backend and Frontend CI steps remain the same) ...

  container-security-ci:
    name: Docker Builds & Vulnerability Scanning
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx Engine
        uses: actions/setup-buildx-action@v3

      # FIX: Updated to a current, stable version to avoid resolution errors
      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.6
        with:
          version: v0.71.2

      - name: Compile Backend Container Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: portfolio-backend:latest
          outputs: type=docker,dest=/tmp/portfolio-backend.tar

      # FIX: Used post-migration tag and skipped internal setup
      - name: Scan Backend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/portfolio-backend.tar
          format: 'table'
          exit-code: 0
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true

      - name: Compile Frontend Container Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: portfolio-frontend:latest
          outputs: type=docker,dest=/tmp/portfolio-frontend.tar

      # FIX: Used post-migration tag and skipped internal setup
      - name: Scan Frontend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/portfolio-frontend.tar
          format: 'table'
          exit-code: 0
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true
