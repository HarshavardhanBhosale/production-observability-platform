
name: harsh-compose

networks:
  public-net:
    driver: bridge
    internal: false
  backend-net:
    driver: bridge
    internal: true
  monitoring-net:
    driver: bridge
    internal: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    container_name: observability-postgres
    restart: always
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_dev_password}
      POSTGRES_DB: app_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-net
    security_opt:
      - no-new-privileges:true
    user: "701:701"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: observability-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    security_opt:
      - no-new-privileges:true
    user: "100:101"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: observability-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:${POSTGRES_PASSWORD:-secure_dev_password}@postgres:5432/app_production
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    networks:
      - backend-net
      - public-net
      - monitoring-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: observability-frontend
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - public-net
    depends_on:
      backend:
        condition: service_started
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: observability-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    user: "65534:65534"

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: observability-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: observability-cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true

  grafana:
    image: grafana/grafana:11.1.0
    container_name: observability-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin_secure_password}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    networks:
      - monitoring-net
      - public-net
    ports:
      - "3000:3000"
    security_opt:
      - no-new-privileges:true
