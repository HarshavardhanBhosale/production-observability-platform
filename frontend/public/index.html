<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Observability Platform Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f9; color: #333; margin: 0; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        .status-box { padding: 15px; border-radius: 6px; margin-bottom: 20px; font-weight: bold; display: none; }
        .error { background-color: #fdf2f2; color: #ec5959; border: 1px solid #f8b4b4; }
        .success { background-color: #f3faf7; color: #0fa66b; border: 1px solid #a3e6cd; }
        .loading { background-color: #f4f6f9; color: #666; border: 1px solid #ddd; font-style: italic; }
        button { background-color: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background-color 0.2s; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        pre { background-color: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 6px; overflow-x: auto; font-family: "Courier New", Courier, monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Observability System Monitor</h1>
        <p>Trigger a secure asynchronous backend transaction pipeline below to verify real-time log ingestion, trace aggregation, and metric tracking.</p>
        
        <button id="fetch-btn">Test Backend Pipeline</button>
        
        <div id="status-message" class="status-box"></div>
        
        <h3>System Output Stream</h3>
        <pre id="output-stream">Click the button above to initialize connection monitoring...</pre>
    </div>
    <script src="app.js"></script>
</body>
</html>
