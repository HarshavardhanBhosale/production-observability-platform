events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Core Upstream Cluster Bindings (Matching container names exactly)
    upstream frontend_server {
        server observability-frontend:3000;
    }

    upstream backend_server {
        server observability-backend:8000;
    }

    upstream grafana_server {
        server observability-grafana:3000;
    }

    upstream alertmanager_server {
        server observability-alertmanager:9093;
    }

    # Block 1: Redirect all incoming public HTTP traffic to secure HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name harsh88.duckdns.org www.harsh88.duckdns.org;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Block 2: Main secure production HTTPS application server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name harsh88.duckdns.org www.harsh88.duckdns.org;

        # SSL Certificates provided by Certbot Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/harsh88.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/harsh88.duckdns.org/privkey.pem;

        # Production SSL hardening parameters
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Public Frontend Routing Layer
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

               # Public Secure API Gateway routing to the Python Container
        location /api/ {
            proxy_pass http://observability-backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Reset HTTP version to allow clean streaming
            proxy_http_version 1.1;
        }


        # Secure Authenticated Grafana Dashboard Portal
        location /grafana/ {
            auth_basic "Observability Platform Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://grafana_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Live WebSockets configuration for real-time dashboard panel updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Secure Authenticated Alertmanager Gateway
        location /alertmanager/ {
            auth_basic "Observability Platform Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://alertmanager_server/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

